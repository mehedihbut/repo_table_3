<html>
<head>
    <title>Table Layout</title>
    <style>
        table {
            border-collapse: collapse;
            width: 400px;
            text-align: center;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }

        .banner {
            height: 120px;
        }

        ol {
            text-align: left;
            margin: 10;
            padding-left: 10px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th>Header1</th>
        <th>Header2</th>
        <th>Header3</th>
    </tr>

    <tr>
        <td colspan="2" class="banner">
            Banner.jpg<br>
            400 × 300
        </td>

        <td>
            <ol type="i">
                <li>Data 1</li>
                <li>Data 2</li>
            </ol>
        </td>
    </tr>
</table>

</body>
</html>
